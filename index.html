<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WE Wedding - 1003</title>
    <!-- 引入 Google Fonts 優雅字體 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link href='https://fonts.googleapis.com/css?family=Cormorant Garamond' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

  </head>
  <body>

    <!-- 轉場圖片 -->
    <div class="splash-screen" id="splashScreen">
        <video autoplay src="./img/openner.mp4" alt="開場圖">
        <div class="hint-text"> </div>
    </div>

    <!-- 1. 封面大圖 -->
    <section class="hero">
      <div class="hero-content">
        <h1>Wen & Eason's Wedding</h1>
      </div>
    </section>

    <!-- 2. 婚宴時間與地點 -->
    <section class="section">
      <h2 class="section-title">Wedding Info</h2>
      <img src="./img/invitation_front.svg" alt="">
      <!-- <div class="info-box">
        <div class="info-item">
          <h3>【 日期與時間 】</h3>
          <p>2026 年 10 月 03 日 (星期六)</p>
          <p>17:00 迎賓入場 / 17:30 雞尾酒時光 / 18:00 正式開席</p>
        </div>
        <div class="info-item">
          <h3>【 宴客地點 】</h3>
          <p>一嶼所在</p>
          <p>3號島鹽埕港區</p>
          <p>地址：高雄市鼓山區蓬萊路1之12號</p>
        </div>
      </div> -->
    </section>

    <!-- 3. RSVP 出席意願調查 -->
    <section class="section" style="background-color: #fffffd">
      <h2 class="section-title">婚禮邀請函回覆表單</h2>

      <form
        class="rsvp-form"
        onsubmit="sent_redirect=true"
        target="iframe_redirect"
        action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfPe7AafXK-7HsMBn7WnDSWH4WdkZUP_dq4gtrwKofrFxfx6Q/formResponse"
        method="POST"
      >
        <div class="form-group">
          <label for="name" class="form-question">姓名</label>
          <input
            type="text"
            id="name"
            name="entry.2064555459"
            class="form-control"
            required
          />

          <label for="phone" class="form-question">手機號碼</label>
          <input
            type="text"
            id="phone"
            class="form-control"
            name="entry.1471833670"
            required
          />

          <label for="relationship">與我們的關係是...</label>
          <input name="entry.1732442341" type="radio" value="family" />家庭／家族成員
          <br />
          <input name="entry.1732442341" type="radio" value="friend" />朋友 / 同事
          <br />
          <input name="" type="radio" value="" />其他 <input name="entry.1732442341" type="text"/>

          <label for=attend-adults" class="form-question">請問當天出席的大人人數？（包含自己！）</label>
          <input
            type="text"
            id="attend-numbers"
            name="entry.2035658109"
            class="form-control"
            required
          />

          <label for=attend-kids" class="form-question">請問當天出席的小孩人數？</label>
          <input
            type="text"
            id="attend-numbers"
            name="entry.2006173139"
            class="form-control"
          />

          <label for="kid-age">請問出席小孩的年齡區間</label>
          <input name="entry.1254805171" type="radio" value="<3" />未滿3歲
          <br />
          <input name="entry.1254805171" type="radio" value="3~6" />3 ~ 6歲
          <br />
          <input name="entry.1254805171" type="radio" value=">6" />6歲以上

          <label for="kid-chair">請問是否需要兒童座椅？</label>
          <input name="entry.459596674" type="radio" value="no" />否 <br />
          <input name="" type="radio" value="" />是，數量為： <input name="entry.459596674" type="text">

          <label for="diet">飲食習慣</label>
          <input name="entry.363807250" type="radio" value="normal" />葷食
          <br />
          <input name="entry.363807250" type="radio" value="vegetarian" />素食

          <label for="comment">備註/特殊需求/留言💬</label>
          <input type="text" id="comment" name="entry.1650259539" class="form-control" />
        </div>
        <button type="submit" class="btn-submit">點我送出表單</button>
      </form>
    </section>

    <!-- 頁尾 -->
    <footer>
      <p>Thank you for being a part of our lives.</p>
      <p>© 2026 Wen & Eason's wedding. All Rights Reserved.</p>
    </footer>
  </body>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const splashScreen = document.getElementById("splashScreen");

      splashScreen.addEventListener("click", () => {
        // 加上 reveal class 觸發 CSS clip-path 動畫
        splashScreen.classList.add("reveal");

        // 等待 CSS transition 動畫結束 (1.2秒 = 1200毫秒) 後移除該節點
        setTimeout(() => {
          splashScreen.style.display = "none";
          // 恢復身體的捲動功能（如果主要內容很長的話）
          document.body.style.overflow = "auto";
          document.html.style.overflow = "auto";
        }, 1200);
      });
    });
  </script>
</html>
