<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>W&E wedding</title>
    <!-- 引入 Google Fonts 優雅字體 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 1. 封面大圖 -->
    <section>
      <div class="logo-container">
        <img style="height: 300px" src="./img/name.svg" alt="" />
        <img style="height: 300px" src="./img/flower_1.svg" alt="" />
      </div>
    </section>

    <!-- 2. 婚宴時間與地點 -->
    <section class="section">
      <h2 class="section-title">Wedding Info</h2>
      <div class="info-box">
        <div class="info-item">
          <h3>【 日期與時間 】</h3>
          <p>2026 年 10 月 03 日 (星期六)</p>
          <p>17:00 賓客入席 / 17:30 雞尾酒時光 / 18:00 正式開席</p>
        </div>
        <div class="info-item">
          <h3>【 地點 】</h3>
          <p>一嶼所在</p>
          <p>3號島鹽埕港區</p>
          <p>高雄市鼓山區蓬萊路1之12號</p>
        </div>
      </div>
    </section>

    <!-- 5. RSVP 出席意願調查 -->
    <section class="section" style="background-color: #fff">
      <h2 class="section-title">RSVP</h2>
      <p style="margin-bottom: 30px">
        為了提供完美的盛宴，請於 2026 年 8 月 31 日前填寫此出席表單：
      </p>

      <form class="rsvp-form" action="#" method="POST">
        <div class="form-group">
          <label for="name">您的姓名</label>
          <input
            type="text"
            id="name"
            class="form-control"
            required
            placeholder="請輸入姓名"
          />
        </div>
        <div class="form-group">
          <label for="attend">是否出席</label>
          <select id="attend" class="form-control">
            <option value="yes">定當準時赴約，共襄盛舉</option>
            <option value="no">不克前往，致上最深祝福</option>
          </select>
        </div>
        <div class="form-group">
          <label for="count">出席人數</label>
          <input
            type="number"
            id="count"
            class="form-control"
            min="1"
            max="10"
            value="1"
          />
        </div>
        <div class="form-group">
          <label for="diet">飲食習慣</label>
          <select id="diet" class="form-control">
            <option value="normal">葷食</option>
            <option value="vegetarian">全素 / 蛋奶素</option>
          </select>
        </div>
        <button type="submit" class="btn-submit">送出回覆</button>
      </form>
    </section>

    <!-- 頁尾 -->
    <footer>
      <p>Thank you for being a part of our lives.</p>
      <p>© 2026 Don & Wedding. All Rights Reserved.</p>
    </footer>
  </body>
</html>
